server:
  port: 8080

spring:
  application:
    name: login-practice
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/login_practice?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-characters}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
